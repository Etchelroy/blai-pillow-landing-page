<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudRest Pillows - Premium Sleep Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #FFFFFF;
            --blue: #2563EB;
            --blue-dark: #1E40AF;
            --blue-light: #DBEAFE;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--gray-900);
            background-color: var(--white);
            line-height: 1.6;
        }

        /* ==================== STICKY NAVIGATION ==================== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 64px;
            background-color: var(--white);
            border-bottom: 1px solid var(--gray-100);
            transition: box-shadow 0.3s ease;
        }

        .navbar.scrolled {
            box-shadow: var(--shadow-lg);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--blue);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--gray-700);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s ease;
            padding: 8px 0;
        }

        .nav-menu a:hover { color: var(--blue); }

        .nav-menu a:focus {
            outline: 2px solid var(--blue);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .nav-cta {
            background-color: var(--blue);
            color: var(--white);
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease, transform 0.2s ease;
            min-height: 44px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border: none;
        }

        .nav-cta:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
        }

        .nav-cta:focus {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background-color: var(--gray-900);
            transition: all 0.3s ease;
            border-radius: 1px;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* ==================== HERO SECTION ==================== */
        .hero {
            min-height: calc(100vh - 64px);
            background: linear-gradient(135deg, var(--white) 0%, var(--blue-light) 100%);
            display: flex;
            align-items: center;
            padding: 80px 24px;
            overflow: hidden;
        }

        .hero-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
            width: 100%;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--blue-light);
            color: var(--blue);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.5px;
            color: var(--gray-900);
            margin-bottom: 24px;
        }

        .hero-title span {
            color: var(--blue);
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--gray-600);
            margin-bottom: 40px;
            max-width: 480px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .btn-primary {
            background-color: var(--blue);
            color: var(--white);
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 52px;
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background-color: var(--white);
            color: var(--gray-700);
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 52px;
            border: 2px solid var(--gray-200);
        }

        .btn-secondary:hover {
            border-color: var(--blue);
            color: var(--blue);
            transform: translateY(-2px);
        }

        .hero-stats {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .hero-stat {
            display: flex;
            flex-direction: column;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: var(--blue);
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--gray-600);
            font-weight: 500;
        }

        .hero-image-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image-bg {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--blue-light) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-img {
            position: relative;
            width: 100%;
            max-width: 560px;
            height: 420px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
        }

        .hero-floating-card {
            position: absolute;
            background: var(--white);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            animation: float 3s ease-in-out infinite;
        }

        .hero-floating-card.card-1 {
            bottom: 32px;
            left: -16px;
        }

        .hero-floating-card.card-2 {
            top: 32px;
            right: -16px;
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .floating-icon {
            width: 36px;
            height: 36px;
            background-color: var(--blue-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
        }

        /* ==================== TRUST BAR ==================== */
        .trust-bar {
            background-color: var(--gray-50);
            border-top: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
            padding: 24px;
            overflow: hidden;
        }

        .trust-bar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 48px;
            flex-wrap: wrap;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray-600);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .trust-icon {
            color: var(--blue);
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ==================== FEATURES SECTION ==================== */
        .features-section {
            padding: 96px 24px;
            background-color: var(--white);
        }

        .section-header {
            text-align: center;
            max-width: 640px;
            margin: 0 auto 64px;
        }

        .section-label {
            display: inline-block;
            color: var(--blue);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--gray-900);
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .section-subtitle {
            font-size: 16px;
            color: var(--gray-600);
            line-height: 1.7;
        }

        .features-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
        }

        .feature-card {
            background-color: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            border-color: var(--blue);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .feature-icon-wrap {
            width: 56px;
            height: 56px;
            background-color: var(--blue-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            margin-bottom: 20px;
        }

        .feature-icon-wrap svg {
            width: 28px;
            height: 28px;
        }

        .feature-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 10px;
        }

        .feature-card p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.6;
        }

        /* ==================== PRODUCTS SECTION ==================== */
        .products-section {
            padding: 96px 24px;
            background-color: var(--gray-50);
        }

        .products-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .product-card {
            background-color: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-6px);
        }

        .product-image-container {
            position: relative;
            overflow: hidden;
            height: 220px;
            background-color: var(--gray-100);
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image-container img {
            transform: scale(1.05
