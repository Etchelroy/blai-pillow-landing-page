<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudRest Pillows - Premium Sleep Solutions</title>
    <meta name="description" content="CloudRest Pillows - Premium memory foam, bamboo cooling, orthopedic, and down alternative pillows for the best sleep of your life.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #FFFFFF;
            --blue: #2563EB;
            --blue-dark: #1E40AF;
            --blue-light: #DBEAFE;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--gray-900);
            background-color: var(--white);
            line-height: 1.6;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-brand svg {
            width: 32px;
            height: 32px;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .navbar-nav a {
            color: var(--gray-700);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .navbar-nav a:hover {
            color: var(--blue);
        }

        .navbar-cta {
            background: var(--blue);
            color: var(--white) !important;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600 !important;
            transition: background 0.2s ease !important;
        }

        .navbar-cta:hover {
            background: var(--blue-dark);
            color: var(--white) !important;
        }

        .navbar-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--gray-700);
        }

        @media (max-width: 768px) {
            .navbar-nav {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background: var(--white);
                flex-direction: column;
                padding: 16px 24px;
                border-bottom: 1px solid var(--gray-200);
                gap: 16px;
                align-items: flex-start;
            }

            .navbar-nav.open {
                display: flex;
            }

            .navbar-toggle {
                display: block;
            }
        }

        /* ===== HERO ===== */
        .hero {
            padding-top: 64px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 50%, #BFDBFE 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            color: var(--blue);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }

        .hero-title {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.15;
            color: var(--gray-900);
            margin-bottom: 24px;
        }

        .hero-title span {
            color: var(--blue);
        }

        .hero-subtitle {
            font-size: 1.125rem;
            color: var(--gray-600);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .btn-primary {
            background: var(--blue);
            color: var(--white);
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            background: var(--blue-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--blue);
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            border: 2px solid var(--blue);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary:hover {
            background: var(--blue-light);
            transform: translateY(-2px);
        }

        .hero-stats {
            display: flex;
            gap: 40px;
        }

        .hero-stat-item {
            text-align: center;
        }

        .hero-stat-number {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--blue);
            display: block;
        }

        .hero-stat-label {
            font-size: 0.8rem;
            color: var(--gray-600);
            font-weight: 500;
        }

        .hero-image-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image-wrapper img {
            width: 100%;
            max-width: 540px;
            height: 400px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            display: block;
        }

        .hero-floating-badge {
            position: absolute;
            bottom: 24px;
            left: -16px;
            background: var(--white);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-floating-badge .badge-icon {
            width: 40px;
            height: 40px;
            background: var(--blue-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
        }

        .hero-floating-badge .badge-text strong {
            display: block;
            font-size: 0.9rem;
            color: var(--gray-900);
        }

        .hero-floating-badge .badge-text span {
            font-size: 0.75rem;
            color: var(--gray-600);
        }

        @media (max-width: 768px) {
            .hero-container {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 48px 24px;
                text-align: center;
            }

            .hero-badge {
                justify-content: center;
            }

            .hero-actions {
                justify-content: center;
            }

            .hero-stats {
                justify-content: center;
            }

            .hero-image-wrapper img {
                max-width: 100%;
            }

            .hero-floating-badge {
                left: 8px;
            }
        }

        /* ===== TRUST BAR ===== */
        .trust-bar {
            background: var(--gray-900);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--white);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .trust-item svg {
            color: #34D399;
            flex-shrink: 0;
        }

        /* ===== FEATURES ===== */
        .features-section {
            padding: 96px 24px;
            background: var(--white);
        }

        .section-header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 64px;
        }

        .section-tag {
            display: inline-block;
            background: var(--blue-light);
            color: var(--blue);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            font-weight: 800;
            color: var(--gray-900);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .section-subtitle {
            font-size: 1.05rem;
            color: var(--gray-600);
            line-height: 1.7;
        }

        .features-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
        }

        .feature-card {
            background: var(--gray-50);
            border-radius: 16px;
            padding: 32px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid var(--gray-100);
        }

        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .feature-icon {
            width: 56px;
            height: 56px;
            background: var(--blue-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            margin-bottom: 20px;
        }

        .feature-icon svg {
            width: 28px;
            height: 28px;
        }

        .feature-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 10px;
        }

        .feature-text {
            font-size: 0.95rem;
            color: var(--gray-600);
            line-height: 1.6;
        }

        /* ===== PRODUCTS ===== */
        .products-section {
            padding: 96px 24px;
            background: var(--gray-50);
        }

        .products-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 32px;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid var(--gray-100);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
        }

        .product-image-wrap {
            position: relative;
            overflow: hidden;
            height: 220px;
        }

        .product-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .product-card:hover .product-image-wrap img {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--blue);
            color: var(--white);
            font-size: 0.75rem;
            font-weight: 600
