<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudRest Pillows - Premium Sleep Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #FFFFFF;
            --blue: #2563EB;
            --blue-dark: #1E40AF;
            --blue-light: #DBEAFE;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--gray-900);
            background-color: var(--white);
            line-height: 1.6;
        }

        /* ==================== STICKY NAVIGATION ==================== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 64px;
            background-color: var(--white);
            border-bottom: 1px solid var(--gray-100);
            transition: box-shadow 0.3s ease;
        }

        .navbar.scrolled {
            box-shadow: var(--shadow-lg);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--blue);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--gray-700);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s ease;
            padding: 8px 0;
        }

        .nav-menu a:hover { color: var(--blue); }

        .nav-menu a:focus {
            outline: 2px solid var(--blue);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .nav-cta {
            background-color: var(--blue);
            color: var(--white);
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease, transform 0.2s ease;
            min-height: 44px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border: none;
        }

        .nav-cta:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
        }

        .nav-cta:focus {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background-color: var(--gray-900);
            transition: all 0.3s ease;
            border-radius: 1px;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* ==================== HERO ==================== */
        .hero {
            min-height: calc(100vh - 64px);
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 50%, #EDE9FE 100%);
            display: flex;
            align-items: center;
            padding: 80px 24px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--blue-light);
            color: var(--blue);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }

        .hero-badge::before {
            content: 'â';
            font-size: 12px;
        }

        .hero-title {
            font-size: clamp(40px, 5vw, 64px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.5px;
            color: var(--gray-900);
            margin-bottom: 24px;
        }

        .hero-title span {
            color: var(--blue);
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--gray-600);
            margin-bottom: 40px;
            max-width: 480px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-primary {
            background-color: var(--blue);
            color: var(--white);
            padding: 16px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 52px;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.35);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--gray-700);
            padding: 16px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 52px;
            border: 2px solid var(--gray-200);
        }

        .btn-secondary:hover {
            border-color: var(--blue);
            color: var(--blue);
            transform: translateY(-2px);
        }

        .hero-trust {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 40px;
        }

        .hero-avatars {
            display: flex;
        }

        .hero-avatars img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--white);
            margin-left: -8px;
            object-fit: cover;
        }

        .hero-avatars img:first-child { margin-left: 0; }

        .hero-trust-text {
            font-size: 13px;
            color: var(--gray-600);
            font-weight: 500;
        }

        .hero-trust-text strong {
            color: var(--gray-900);
        }

        .hero-image-wrap {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image-wrap::before {
            content: '';
            position: absolute;
            inset: -16px;
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(139,92,246,0.1));
            border-radius: 32px;
            z-index: 0;
        }

        .hero-img {
            width: 100%;
            max-width: 560px;
            border-radius: 24px;
            object-fit: cover;
            aspect-ratio: 4/3;
            position: relative;
            z-index: 1;
            box-shadow: var(--shadow-xl);
        }

        .hero-float-card {
            position: absolute;
            background: var(--white);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: var(--shadow-xl);
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-float-card.top-left {
            top: 24px;
            left: -24px;
        }

        .hero-float-card.bottom-right {
            bottom: 24px;
            right: -24px;
        }

        .float-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .float-icon.blue { background-color: var(--blue-light); }
        .float-icon.green { background-color: #D1FAE5; }

        .float-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .float-sub {
            font-size: 11px;
            color: var(--gray-600);
            margin-top: 2px;
        }

        /* ==================== TRUST BAR ==================== */
        .trust-bar {
            background-color: var(--gray-50);
            border-top: 1px solid var(--gray-100);
            border-bottom: 1px solid var(--gray-100);
            padding: 32px 24px;
        }

        .trust-bar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
            align-items: center;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray-600);
            font-size: 14px;
            font-weight: 500;
        }

        .trust-icon {
            font-size: 20px;
        }

        /* ==================== SECTION SHARED ==================== */
        section {
            padding: 96px 24px;
        }

        .section-label {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 12px;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 12px;
        }

        .section-title {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--gray-900);
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .section-sub {
            font-size: 17px;
            color: var(--gray-600);
            max-width: 560px;
            line-height: 1.7;
        }

        .section-header {
            text-align: center;
            margin-bottom: 64px;
        }

        .section-header .section-sub {
            margin: 0 auto;
        }

        /* ==================== FEATURES ==================== */
        .features {
            background-color: var(--white);
        }

        .features-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
        }

        .feature-card {
            background: var(--gray-50);
            border: 1px solid var(--gray-100);
            border-radius: 20px;
            padding: 40px 32px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue), #8B5CF6);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--gray-200);
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-icon-wrap {
            width: 56px;
            height: 56px;
            background-color: var(--blue-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 24px;
        }

        .feature-title {
            font-size: 18px;
            font-
