<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudRest Pillows - Premium Sleep Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #FFFFFF;
            --blue: #2563EB;
            --blue-dark: #1E40AF;
            --blue-light: #DBEAFE;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--gray-900);
            background-color: var(--white);
            line-height: 1.6;
        }

        /* ==================== STICKY NAVIGATION ==================== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 64px;
            background-color: var(--white);
            border-bottom: 1px solid var(--gray-100);
            transition: box-shadow 0.3s ease;
        }

        .navbar.scrolled {
            box-shadow: var(--shadow-lg);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--blue);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--gray-700);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s ease;
            position: relative;
            padding: 8px 0;
        }

        .nav-menu a:hover {
            color: var(--blue);
        }

        .nav-menu a:focus {
            outline: 2px solid var(--blue);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .nav-cta {
            background-color: var(--blue);
            color: var(--white);
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease, transform 0.2s ease;
            min-height: 44px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border: none;
        }

        .nav-cta:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
        }

        .nav-cta:focus {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background-color: var(--gray-900);
            transition: all 0.3s ease;
            border-radius: 1px;
        }

        /* ==================== HERO SECTION ==================== */
        .hero {
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            gap: 48px;
        }

        .hero-content h1 {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.2;
            color: var(--gray-900);
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .hero-content p {
            font-size: 18px;
            color: var(--gray-600);
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background-color: var(--blue);
            color: var(--white);
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            min-height: 48px;
            display: inline-flex;
            align-items: center;
        }

        .btn-primary:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:focus {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        .btn-secondary {
            background-color: var(--gray-100);
            color: var(--gray-900);
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border: 2px solid var(--gray-300);
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 48px;
            display: inline-flex;
            align-items: center;
        }

        .btn-secondary:hover {
            background-color: var(--white);
            border-color: var(--blue);
            color: var(--blue);
            transform: translateY(-2px);
        }

        .btn-secondary:focus {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        .hero-stats {
            display: flex;
            gap: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--gray-200);
        }

        .stat {
            flex: 1;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--blue);
        }

        .stat-label {
            font-size: 14px;
            color: var(--gray-600);
            margin-top: 8px;
        }

        .hero-image {
            position: relative;
            height: 500px;
            background: linear-gradient(135deg, var(--blue-light) 0%, var(--gray-100) 100%);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* ==================== TRUST BAR ==================== */
        .trust-bar {
            background-color: var(--gray-50);
            padding: 48px 24px;
            border-top: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
        }

        .trust-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px;
            text-align: center;
        }

        .trust-item h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .trust-item p {
            font-size: 14px;
            color: var(--gray-600);
        }

        /* ==================== PRODUCT GRID ==================== */
        .products-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 96px 24px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 64px;
        }

        .section-header h2 {
            font-size: 44px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .section-header p {
            font-size: 18px;
            color: var(--gray-600);
            max-width: 600px;
            margin: 0 auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px;
        }

        .product-card {
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
        }

        .product-card:focus-within {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        .product-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, var(--blue-light) 0%, var(--gray-100) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-wishlist {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 44px;
            height: 44px;
            background-color: var(--white);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-md);
        }

        .product-wishlist:hover {
            background-color: var(--blue);
        }

        .product-wishlist:hover svg {
            stroke: var(--white);
            fill: var(--white);
        }

        .product-wishlist:focus {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        .product-wishlist svg {
            width: 20px;
            height: 20px;
            stroke: var(--blue);
            fill: none;
            transition: all 0.2s ease;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--white);
            border: 1px solid var(--gray-200);
            border-top: none;
        }

        .product-category {
            font-size: 12px;
            font-weight: 600;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-description {
            font-size: 14px;
            color: var(--gray-600);
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .stars {
            display: flex;
            gap: 4px;
        }

        .star {
            width: 16px;
            height: 16px;
            fill: #FCD34D;
        }

        .rating-count {
            font-size: 13px;
            color: var(--gray-600);
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--blue);
        }

        .product-price-original {
            font-size: 14px;
            color: var(--gray-600);
            text-decoration: line-through;
            margin-left: 8px;
        }

        .product-btn {
            background-color: var(--blue);
            color: var(--white);
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 40px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .product-btn:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .product-btn:focus {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        /* ==================== BENEFITS SECTION ==================== */
        .benefits-section {
            background-color: var(--gray-50);
            padding: 96px 24px;
            border-top: 1px solid var(--gray-200);
        }

        .benefits-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .benefits-grid {
            display:
